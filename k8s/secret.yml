apiVersion: v1
kind: Secret
metadata:
  name: netsentry-secrets
  namespace: netsentry
  labels:
    app: netsentry
type: Opaque
data:
  # Replace these with your base64-encoded values:
  #   echo -n "your_key" | base64
  VIRUSTOTAL_API_KEY: <YOUR_BASE64_ENCODED_VALUE>
  WHOISXML_API_KEY: <YOUR_BASE64_ENCODED_VALUE>
  SESSION_SECRET: <YOUR_BASE64_ENCODED_VALUE>
