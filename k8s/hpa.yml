# Automatically scales pods based on CPU usage.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: netsentry
  namespace: netsentry
  labels:
    app: netsentry
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: netsentry
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
