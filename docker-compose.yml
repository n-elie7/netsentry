services:
  web01:
    build: .
    container_name: netsentry-web01
    environment:
      - PORT=3000
      - NODE_ENV=production
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - WHOISXML_API_KEY=${WHOISXML_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - web01_data:/app/data
    restart: unless-stopped
    networks:
      - netsentry-net

  web02:
    build: .
    container_name: netsentry-web02
    environment:
      - PORT=3000
      - NODE_ENV=production
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY}
      - WHOISXML_API_KEY=${WHOISXML_API_KEY}
      - SESSION_SECRET=${SESSION_SECRET}
    volumes:
      - web02_data:/app/data
    restart: unless-stopped
    networks:
      - netsentry-net
      
  lb01:
    image: nginx:alpine
    container_name: netsentry-lb01
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web01
      - web02
    restart: unless-stopped
    networks:
      - netsentry-net

volumes:
  web01_data:
  web02_data:

networks:
  netsentry-net:
    driver: bridge
